name: CI/CD

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ───────────────────────────────────────────────────────────────────
# Reproducibility: pin every action to a full SHA and every OS to a
# specific release.  Dependency versions are locked below.
# ───────────────────────────────────────────────────────────────────
env:
  # Eigen 5.x is discovered via CMake config-mode (system package)
  CMAKE_BUILD_PARALLEL_LEVEL: "4"

jobs:
  # ── Lint (runs once, fast) ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install nox clang-tools
      - run: nox -s lint

  # ── Test matrix ─────────────────────────────────────────────────
  test:
    name: Test · ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-24.04
            python-version: "3.10"
          - os: ubuntu-24.04
            python-version: "3.11"
          - os: ubuntu-24.04
            python-version: "3.12"
          - os: ubuntu-24.04
            python-version: "3.13"
          # macOS (Apple Silicon)
          - os: macos-14
            python-version: "3.12"
          # Windows
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libeigen3-dev libboost-dev lcov

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja eigen boost lcov

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y ninja eigen

      - name: Install Python dependencies
        run: pip install --upgrade pip nox

      - name: Build
        run: nox -s build

      - name: Test
        run: nox -s test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: build-tests/

  # ── Documentation ───────────────────────────────────────────────
  docs:
    name: Build Documentation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install sphinx sphinx-rtd-theme -r docs/requirements.txt
      - run: sphinx-build -W -a -n docs/source docs/_build/html
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: documentation
          path: docs/_build/html/
          retention-days: 30

  # ── Gate (branch-protection target) ─────────────────────────────
  gate:
    name: All Checks Pass
    runs-on: ubuntu-24.04
    needs: [lint, test, docs]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.docs.result }}" != "success" ]; then
            echo "❌ One or more required checks failed"
            exit 1
          fi
          echo "✅ All required checks passed"

  # ── Coverage (main branch only) ─────────────────────────────────
  coverage:
    name: Code Coverage Report
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libeigen3-dev libboost-dev lcov
      - run: pip install nox
      - run: nox -s coverage
      - uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d  # v5.4.2
        with:
          files: ./build-tests/coverage.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ── Build wheels (tag releases only) ────────────────────────────
  build-wheels:
    name: Build wheels · ${{ matrix.os }}
    needs: [gate]
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-14
          - os: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libeigen3-dev libboost-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja eigen boost

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install -y ninja eigen

      - run: |
          pip install --upgrade pip build
          python -m build --wheel --outdir dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: wheels-${{ matrix.os }}
          path: dist/
          retention-days: 30

  # ── Publish (tag releases only) ─────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-wheels]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          draft: false
          prerelease: false
