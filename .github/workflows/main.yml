name: CI/CD

# Trigger on push to master and pull requests
on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Test suite runs on all platforms
  test:
    name: Test on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            python-version: "3.9"
            arch: x86_64
          - os: ubuntu-latest
            python-version: "3.11"
            arch: x86_64
          - os: ubuntu-latest
            python-version: "3.12"
            arch: x86_64
          # Windows x86_64
          - os: windows-latest
            python-version: "3.11"
            arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Platform-specific dependency installation
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libeigen3-dev libboost-all-dev lcov

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja eigen boost lcov

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y cmake ninja eigen boost-msvc-14.3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel nox

      - name: Run all checks
        run: |
          nox -s build
          nox -s test
          nox -s lint

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: build-tests/

  # Build wheels for all platforms (only on tag releases to save CI time)
  build-wheels:
    name: Build wheels - ${{ matrix.os }}
    needs: [test, docs]
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: windows-latest
            arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libeigen3-dev libboost-all-dev

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y cmake ninja eigen boost-msvc-14.3

      - name: Build wheels
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m build --wheel --outdir dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
          retention-days: 30

  # Coverage report (only on main branch pushes, not every PR)
  coverage:
    name: Code Coverage Report
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libeigen3-dev libboost-all-dev lcov

      - name: Generate coverage report
        run: |
          pip install nox
          nox -s coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./build-tests/coverage.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Build documentation
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install sphinx sphinx-rtd-theme
          pip install -r docs/requirements.txt

      - name: Build documentation
        run: |
          sphinx-build -W -a -n docs/source docs/_build/html

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/_build/html/
          retention-days: 30

  # Gate job: requires all checks to pass (no merge without this)
  gate:
    name: All Checks Pass
    runs-on: ubuntu-latest
    needs: [test, docs]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.docs.result }}" != "success" ]; then
            echo "❌ One or more required checks failed"
            exit 1
          fi
          echo "✅ All required checks passed"

  # Publish to PyPI on release tags
  publish:
    name: Publish to PyPI
    needs: [test, docs, build-wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          draft: false
          prerelease: false
